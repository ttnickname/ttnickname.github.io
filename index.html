<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ваши ники</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    .spotlight {
      position: absolute;
      bottom: 0;
      width: 180px;
      height: 400px;
      background: radial-gradient(
        ellipse at 50% 100%,
        rgba(180, 100, 255, 0.18) 0%,
        rgba(140,  60, 220, 0.12) 30%,
        rgba(100,  40, 180, 0.06) 60%,
        transparent 80%
      );
      filter: blur(40px);
      opacity: 0.7;
      animation: pulse 7s infinite alternate ease-in-out;
      pointer-events: none;
      z-index: 1;
    }

    .spotlight.left  { left: 15%; transform: rotate(-12deg); }
    .spotlight.right { right: 15%; transform: rotate(12deg); }

    @keyframes pulse {
      0%,100% { opacity: 0.55; transform: scaleY(1.0) rotate(var(--rot)); }
      50%     { opacity: 0.85; transform: scaleY(1.15) rotate(var(--rot)); }
    }

    h1 {
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 200;
      letter-spacing: 0.18em;
      margin-bottom: 20px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #222, #aaa, #222);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      z-index: 3;
      text-shadow: 0 0 30px rgba(180,100,255,0.4);
      animation: titlePulse 9s infinite alternate;
    }

    @keyframes titlePulse {
      0%,100% { opacity: 0.75; filter: brightness(0.9); }
      50%     { opacity: 0.98; filter: brightness(1.35); }
    }

    .callsign {
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #d0a0ff;
      text-shadow: 0 0 15px rgba(180,100,255,0.6),
                   0 0 30px rgba(140,60,220,0.4);
      margin-bottom: 60px;
      align-self: flex-start;
      margin-left: calc(50% - 180px);
      z-index: 3;
      white-space: nowrap;
    }

    .container {
      width: 100%;
      max-width: 720px;
      z-index: 3;
      text-align: center;
    }

    .nick {
      font-size: clamp(1.9rem, 5.8vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.09em;
      margin: 35px 0;
      padding: 15px 35px;
      opacity: 0;
      transform: translateY(40px);
      transition: all 1.1s ease-out;
      display: inline-block;
      position: relative;
    }

    .nick.visible {
      opacity: 1;
      transform: translateY(0);
      text-shadow: 0 0 28px rgba(180,100,255,0.75),
                   0 0 55px rgba(140, 60,220,0.4);
    }

    .nick:nth-child(1) { transition-delay: 0.7s; }
    .nick:nth-child(2) { transition-delay: 1.4s; }
    .nick:nth-child(3) { transition-delay: 2.1s; }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.4;
    }

    .particle {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(255,255,255,0.6);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0.4); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-20vh) scale(0.7); opacity: 0; }
    }

  </style>
</head>
<body>

  <div class="spotlight left" style="--rot: -12deg;"></div>
  <div class="spotlight right" style="--rot: 12deg;"></div>

  <div class="particles">
    <div class="particle" style="left:10%; animation-duration:90s; animation-delay:-20s; width:2px; height:2px;"></div>
    <div class="particle" style="left:25%; animation-duration:110s; animation-delay:-35s; width:1.5px; height:1.5px;"></div>
    <div class="particle" style="left:40%; animation-duration:140s; animation-delay:-50s; width:3px; height:3px; opacity:0.6;"></div>
    <div class="particle" style="left:55%; animation-duration:80s; animation-delay:-15s; width:2px; height:2px;"></div>
    <div class="particle" style="left:70%; animation-duration:120s; animation-delay:-60s; width:2.5px; height:2.5px;"></div>
    <div class="particle" style="left:85%; animation-duration:100s; animation-delay:-40s; width:1.8px; height:1.8px;"></div>
  </div>

  <h1>ваши ники</h1>

  <div class="callsign">позывной "бананчик" 🍌🌪️</div>

  <div class="callsign">fil1essx</div>

  <div class="container">
    <div class="nick"></div>
    <div class="nick"></div>
    <div class="nick"></div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.nick').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 900 + i * 700);
      });
    });
  </script>

</body>
</html>
