<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ваши ники</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2vh 4vw;
      overflow: hidden;
      position: relative;
    }

    .spotlight {
      position: absolute;
      bottom: 0;
      width: 140px;
      height: 300px;
      background: radial-gradient(
        ellipse at 50% 100%,
        rgba(180, 100, 255, 0.16) 0%,
        rgba(140,  60, 220, 0.10) 30%,
        rgba(100,  40, 180, 0.05) 60%,
        transparent 80%
      );
      filter: blur(35px);
      opacity: 0.65;
      animation: pulse 8s infinite alternate ease-in-out;
      pointer-events: none;
      z-index: 1;
    }

    .spotlight.left  { left: 10%; transform: rotate(-10deg); }
    .spotlight.right { right: 10%; transform: rotate(10deg); }

    @keyframes pulse {
      0%,100% { opacity: 0.5; transform: scaleY(1.0) rotate(var(--rot)); }
      50%     { opacity: 0.8; transform: scaleY(1.12) rotate(var(--rot)); }
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 3.8rem);
      font-weight: 200;
      letter-spacing: 0.15em;
      margin: 1vh 0 1.5vh;
      text-transform: uppercase;
      background: linear-gradient(90deg, #222, #aaa, #222);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      z-index: 3;
      text-shadow: 0 0 25px rgba(180,100,255,0.35);
      animation: titlePulse 10s infinite alternate;
    }

    @keyframes titlePulse {
      0%,100% { opacity: 0.7; filter: brightness(0.9); }
      50%     { opacity: 0.95; filter: brightness(1.3); }
    }

    .callsign {
      font-size: clamp(1.1rem, 3.5vw, 2.2rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #d0a0ff;
      text-shadow: 0 0 12px rgba(180,100,255,0.5);
      margin: 0.5vh 0 4vh;
      align-self: flex-start;
      margin-left: 8vw;
      z-index: 3;
      white-space: nowrap;
    }

    .container {
      width: 100%;
      max-width: 90vw;
      z-index: 3;
      text-align: center;
      position: relative;
    }

    .nick {
      font-size: clamp(1.5rem, 5vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 0.07em;
      margin: 2.5vh 0;
      padding: 1vh 3vw;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s ease-out;
      display: block;
    }

    .nick.visible {
      opacity: 1;
      transform: translateY(0);
      text-shadow: 0 0 22px rgba(180,100,255,0.7),
                   0 0 45px rgba(140, 60,220,0.35);
    }

    .nick:nth-child(1) { transition-delay: 0.6s; }
    .nick:nth-child(2) { transition-delay: 1.2s; }
    .nick:nth-child(3) { transition-delay: 1.8s; }

    /* Надписи "свободно" — уменьшены и сдвинуты внутрь экрана */
    .free-label {
      position: absolute;
      color: #ffffff;
      font-size: clamp(0.9rem, 2.2vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      opacity: 0.55;
      pointer-events: none;
      white-space: nowrap;
      z-index: 2;
    }

    .free-top {
      top: 5%;
    }

    .free-top:nth-child(1) { left: 8%;  transform: rotate(-15deg); }
    .free-top:nth-child(2) { left: 22%; transform: rotate(14deg);  }
    .free-top:nth-child(3) { left: 38%; transform: rotate(-16deg); }
    .free-top:nth-child(4) { left: 62%; transform: rotate(15deg);  }
    .free-top:nth-child(5) { left: 78%; transform: rotate(-13deg); }

    .free-bottom {
      bottom: 5%;
    }

    .free-bottom:nth-child(1) { left: 10%; transform: rotate(16deg);  }
    .free-bottom:nth-child(2) { left: 25%; transform: rotate(-14deg); }
    .free-bottom:nth-child(3) { left: 42%; transform: rotate(13deg);  }
    .free-bottom:nth-child(4) { left: 60%; transform: rotate(-15deg); }
    .free-bottom:nth-child(5) { left: 75%; transform: rotate(17deg);  }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.35;
    }

    .particle {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 5px rgba(255,255,255,0.5);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0.4); opacity: 0; }
      15%  { opacity: 0.6; }
      85%  { opacity: 0.45; }
      100% { transform: translateY(-15vh) scale(0.65); opacity: 0; }
    }

  </style>
</head>
<body>

  <div class="spotlight left" style="--rot: -10deg;"></div>
  <div class="spotlight right" style="--rot: 10deg;"></div>

  <div class="particles">
    <div class="particle" style="left:12%; animation-duration:100s; animation-delay:-25s; width:1.8px; height:1.8px;"></div>
    <div class="particle" style="left:28%; animation-duration:130s; animation-delay:-40s; width:1.4px; height:1.4px;"></div>
    <div class="particle" style="left:45%; animation-duration:160s; animation-delay:-55s; width:2.5px; height:2.5px; opacity:0.5;"></div>
    <div class="particle" style="left:58%; animation-duration:90s; animation-delay:-18s; width:1.8px; height:1.8px;"></div>
    <div class="particle" style="left:72%; animation-duration:140s; animation-delay:-70s; width:2px; height:2px;"></div>
  </div>

  <h1>ваши ники</h1>

  <div class="callsign">позывной "бананчик" 🍌🌪️</div>

  <div class="container">

    <!-- твои три ника остаются нетронутыми -->
    <div class="nick"> fil1essx</div>
    <div class="nick">eden</div>
    <div class="nick">свободно</div>

    <!-- свободно сверху (теперь ближе к краям экрана) -->
    <div class="free-label free-top">свободно</div>
    <div class="free-label free-top">свободно</div>
    <div class="free-label free-top">свободно</div>
    <div class="free-label free-top">свободно</div>
    <div class="free-label free-top">свободно</div>

    <!-- свободно снизу -->
    <div class="free-label free-bottom">свободно</div>
    <div class="free-label free-bottom">свободно</div>
    <div class="free-label free-bottom">свободно</div>
    <div class="free-label free-bottom">свободно</div>
    <div class="free-label free-bottom">свободно</div>

  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.nick').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), 800 + i * 650);
      });
    });
  </script>

</body>
</html>
